[tool.poetry]
name = "fit_verify_pdf_timestamp"
version = "1.0.0"
description = "FIT Verify PDF Timestamp module provides a graphical interface for verifying the timestamp applied to the PDF report generated by FIT during the acquisition process."
authors = ["FIT Project"]
license = "LGPL-3.0-or-later"
packages = [
    { include = "fit_verify_pdf_timestamp" }
]

exclude = ["fit_verify_pdf_timestamp/ui/**"]

include = [
    "fit_assets/templates/*.html",
    "fit_assets/images/logo-640x640.png"
]

[tool.poetry.dependencies]
python = ">=3.11,<3.14"
PySide6 = "6.9.0"
rfc3161ng = "^2.1.3"

fit-cases = {git = "https://github.com/fit-project/fit-cases.git", branch = "main"}


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--strict-markers"
pythonpath = ["."]
markers = [
    "unit: fast isolated tests",
    "contract: cross-module contract tests for public interfaces and integrations",
    "integration: integration tests with real external resources and dependencies",
    "e2e: end-to-end UI workflow tests",
]

[tool.mypy]
python_version = "3.11"
explicit_package_bases = true

[[tool.mypy.overrides]]
module = [
    "fit_common.*",
    "fit_cases.*",
    "fit_configurations.*",
    "rfc3161ng",
]
ignore_missing_imports = true
